<!DOCTYPE html>
<html>
<head>
    <title>Slots</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Available Slots</h1>
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Slot Time</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for slot in slots %}
                <tr>
                    <td>{{ slot[0] }}</td>
                    <td>{{ slot[1] }}</td>
                    <td class="{% if slot[2] %}table-danger{% else %}table-success{% endif %}">
                        {% if slot[2] %}
                            Booked by {{ slot[2] }}
                        {% else %}
                            Available
                        {% endif %}
                    </td>
                    <td>
                        {% if not slot[2] %}
                            <a href="/book/{{ slot[0] }}" class="btn btn-sm btn-primary">Book Now</a>
                        {% else %}
                            -
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/dashboard" class="btn btn-secondary mt-3">Back to Dashboard</a>
    </div>
</body>
</html>
